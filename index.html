<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="New Hope Lutheran Church - Live Stream Viewer">
  <title>New Hope Lutheran Church - Live Stream</title>
  <style>
    :root {
      --page-bg: #111;
      --panel-bg: #181818;
      --text: #f2f2f2;
      --muted: #b8b8b8;
      --link: #9ecbff;
      --accent: #4a9eff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page-bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    main {
      width: min(1200px, 100%);
      background: var(--panel-bg);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(1.4rem, 2.8vw, 2.1rem);
      font-weight: 600;
      text-align: center;
    }

    .video-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
    }

    .video-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .mute-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      border: 2px solid #fff;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .mute-btn:hover {
      background: rgba(0, 0, 0, 0.9);
    }

    .fs-toggle-btn {
      position: absolute;
      left: 10px;
      bottom: 10px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      border: 1px solid #fff;
      border-radius: 5px;
      padding: 6px 10px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .fs-toggle-btn:hover {
      background: rgba(0, 0, 0, 0.9);
    }

    .viewer-actions {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-start;
    }

    .viewer-actions button {
      background: #2a2a2a;
      color: #fff;
      border: 2px solid #555;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .viewer-actions button:hover {
      background: #3a3a3a;
      border-color: #777;
    }

    .fallback {
      margin: 16px 0 0;
      color: var(--muted);
      text-align: center;
      font-size: 1rem;
    }

    .fallback a { color: var(--link); font-weight: 600; }

    .error-message {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #1a1a1a;
      color: #ff6b6b;
      text-align: center;
      padding: 20px;
      z-index: 30;
    }

    .error-message.show {
      display: flex;
    }
  </style>
</head>
<body>
  <main>
    <h1>New Hope Lutheran Church<br>Live Stream</h1>

    <!-- 
      ============================================================
      PRODUCTION VERSION - Optimized for Cloudflare Pages
      ============================================================

      WEEKLY UPDATE INSTRUCTIONS (Very Simple)

      1. Schedule your Sunday stream in YouTube.
      2. Open the scheduled stream page.
      3. Copy the Video ID from the URL (the long code after ?v= ).
      4. Paste it below between the quotes.
      5. Save the file and upload to Cloudflare Pages.

      Example: const VIDEO_ID = "abc123XYZ456";
      ============================================================
    -->
    <script>
      // ============================================================
      // CHANGE THIS EVERY SUNDAY with the new stream Video ID
      // ============================================================
      const VIDEO_ID = "vDRZXDoykFk";   // ← Replace with current Sunday stream ID
    </script>

    <div class="video-frame" id="video-frame">
      <iframe
        id="yt-player"
        src=""
        title="New Hope Lutheran Church Live Stream"
        allow="autoplay; encrypted-media; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen>
      </iframe>

      <!-- Mute / Unmute Button -->
      <button id="mute-btn" class="mute-btn" type="button">
        🔇 <span id="mute-text">Unmute</span>
      </button>

      <!-- Fullscreen Toggle Button -->
      <button id="fs-toggle-btn" class="fs-toggle-btn" type="button">
        ⛶ Full Screen
      </button>

      <!-- Error message overlay (shown if player fails) -->
      <div id="error-message" class="error-message">
        <p>⚠️ Unable to load the live stream.</p>
        <p>Please try the button below to watch directly on YouTube.</p>
      </div>
    </div>

    <div class="viewer-actions">
      <button id="youtube-details-btn" type="button">Description &amp; Comments</button>
    </div>

    <p class="fallback">
      Having trouble viewing the stream?
      <a href="https://www.youtube.com/@NewHopeLutheranChurchRegina/live" target="_blank" rel="noopener">
        Open directly on YouTube
      </a>
    </p>
  </main>

  <script>
    let player;

    function onYouTubeIframeAPIReady() {
      const iframe = document.getElementById('yt-player');
      
      // Set the embed source with recommended parameters
      iframe.src = `https://www.youtube.com/embed/${VIDEO_ID}?autoplay=1&mute=1&playsinline=1&controls=1&rel=0&enablejsapi=1&modestbranding=1`;

      player = new YT.Player('yt-player', {
        events: {
          'onReady': onPlayerReady,
          'onError': onPlayerError
        }
      });
    }

    function onPlayerReady() {
      updateMuteButton();
      updateFullscreenButton();
      // Hide any previous error message
      document.getElementById('error-message').classList.remove('show');
    }

    function onPlayerError(event) {
      console.error('YouTube Player Error:', event.data);
      // Show user-friendly error message
      document.getElementById('error-message').classList.add('show');
    }

    function updateMuteButton() {
      const btn = document.getElementById('mute-btn');
      const text = document.getElementById('mute-text');
      if (!player || typeof player.isMuted !== 'function') return;

      text.textContent = player.isMuted() ? 'Unmute' : 'Mute';
    }

    function toggleMute() {
      if (!player || typeof player.isMuted !== 'function') return;
      player.isMuted() ? player.unMute() : player.mute();
      setTimeout(updateMuteButton, 80);
    }

    function toggleFullscreen() {
      const frame = document.getElementById('video-frame');
      const isFS = document.fullscreenElement || 
                   document.webkitFullscreenElement || 
                   document.msFullscreenElement;

      if (!isFS) {
        if (frame.requestFullscreen) frame.requestFullscreen();
        else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
        else if (frame.msRequestFullscreen) frame.msRequestFullscreen();
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if (document.msExitFullscreen) document.msExitFullscreen();
      }
    }

    function updateFullscreenButton() {
      const btn = document.getElementById('fs-toggle-btn');
      const isFS = document.fullscreenElement || 
                   document.webkitFullscreenElement || 
                   document.msFullscreenElement;
      btn.innerHTML = isFS ? '✕ Exit Full Screen' : '⛶ Full Screen';
    }

    function openYouTubeDetails() {
      let url = `https://www.youtube.com/watch?v=${VIDEO_ID}`;
      try {
        if (player && typeof player.getVideoUrl === 'function') {
          const playerUrl = player.getVideoUrl();
          if (playerUrl && playerUrl !== "https://www.youtube.com/") {
            url = playerUrl;
          }
        }
      } catch(e) {}
      window.open(url, "_blank");
    }

    function setupControls() {
      document.getElementById('mute-btn').addEventListener('click', toggleMute);
      document.getElementById('fs-toggle-btn').addEventListener('click', toggleFullscreen);
      document.getElementById('youtube-details-btn').addEventListener('click', openYouTubeDetails);

      const frame = document.getElementById('video-frame');
      frame.addEventListener('dblclick', toggleFullscreen);

      // Update fullscreen button when exiting via ESC key etc.
      document.addEventListener('fullscreenchange', updateFullscreenButton);
      document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
      document.addEventListener('msfullscreenchange', updateFullscreenButton);
    }

    function loadYouTubeAPI() {
      const tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      const firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    }

    function init() {
      // Safety check - make sure a real 11-character Video ID is set
      if (!VIDEO_ID || VIDEO_ID.length !== 11 || VIDEO_ID === "i3kFROZmtvE") {
        console.warn("%c[Live Stream Viewer] Please replace VIDEO_ID with the current Sunday stream Video ID.", "color: orange; font-weight: bold");
        document.getElementById('error-message').innerHTML = 
          '<p>Please update the VIDEO_ID in the code with the current stream.</p>';
        document.getElementById('error-message').classList.add('show');
        return;
      }

      loadYouTubeAPI();
      setupControls();
    }

    window.onload = init;
  </script>
</body>
</html>
